<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudiFlow - Dashboard Mahasiswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14b8a6">
    <link rel="icon" href="icon-512.png">
</head>

<body>
    <div class="container">
        <header>
            <div class="user-badge">NIM: 20250803089</div>
            <button id="notif-btn" onclick="requestNotifPermission()"
                style="padding: 5px 10px; font-size: 0.7rem; background: #334155; margin-left: 10px; border-radius: 8px; border: 1px solid #64748b; color: #cbd5e1; cursor: pointer;">
                🔔 Aktifkan Pengingat
            </button>
            <div class="logo-icon">🚀</div>
            <h1>Studi<span>Flow</span></h1>
            <p>Satu tempat untuk semua tugas, materi, dan jadwalmu.</p>
        </header>

        <nav class="menu-bar">
            <button class="tab-btn active" onclick="switchTab('akademik', this)">📚 Tugas & Materi</button>
            <button class="tab-btn" onclick="switchTab('acara', this)">🗓️ Acara</button>
        </nav>

        <div id="tab-akademik" class="tab-content active">
            <!-- Form Toggle -->
            <div class="form-toggle-row">
                <button class="tab-btn active" onclick="changeAkademikForm('tugas', this)">📝 Form Tugas</button>
                <button class="tab-btn" onclick="changeAkademikForm('materi', this)">📁 Form Materi</button>
            </div>

            <!-- Quick Stats -->
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-num" id="stat-tugas">0</span>
                    <span class="stat-label">Tugas Aktif</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-materi">0</span>
                    <span class="stat-label">Total Materi</span>
                </div>
                <div class="stat-card urgent-stat">
                    <span class="stat-num" id="stat-urgent">0</span>
                    <span class="stat-label">Prioritas Tinggi</span>
                </div>
            </div>

            <!-- Form Tugas -->
            <section class="input-section" id="form-tugas">
                <div class="input-group-row">
                    <select id="courseName" required>
                        <option value="" disabled selected>Pilih Mata Kuliah...</option>
                    </select>
                    <button type="button" class="icon-btn" onclick="promptAddCourse()"
                        title="Tambah Matkul Baru">➕</button>
                </div>
                <input type="text" id="taskName" placeholder="Nama Tugas (misal: Projek Ngoding)..." required>
                <textarea id="taskDesc" rows="2" placeholder="Catatan / Deskripsi Tugas (Opsional)..."></textarea>
                <div class="datetime-group">
                    <select id="taskPriority" required>
                        <option value="rendah">🟢 Prioritas Rendah</option>
                        <option value="sedang" selected>🟡 Prioritas Sedang</option>
                        <option value="tinggi">🔴 Prioritas Tinggi</option>
                    </select>
                </div>
                <div class="datetime-group">
                    <input type="date" id="deadlineDate" required>
                    <input type="time" id="deadlineTime" required value="23:59">
                </div>
                <button onclick="addTask()">+ Tambah Tugas</button>
            </section>

            <!-- Form Materi -->
            <section class="input-section" id="form-materi" style="display: none;">
                <div class="input-group-row">
                    <select id="matCourse" required>
                        <option value="" disabled selected>Pilih Mata Kuliah...</option>
                    </select>
                    <button type="button" class="icon-btn" onclick="promptAddCourse()"
                        title="Tambah Matkul Baru">➕</button>
                </div>
                <input type="text" id="matName" placeholder="Nama Judul Materi..." required>

                <div class="datetime-group">
                    <select id="matType">
                        <option value="PDF">📄 PDF</option>
                        <option value="PPT">📊 PPT / Slide</option>
                        <option value="DOC">📝 Word / Doc</option>
                        <option value="Lainnya">📦 Lainnya</option>
                    </select>

                    <select id="matSourceType" onchange="toggleMatInput()">
                        <option value="link">🔗 Link Web / Drive</option>
                        <option value="file">📁 Upload File (Pilih PDF/Doc)</option>
                    </select>
                </div>

                <textarea id="matDesc" rows="2" placeholder="Deskripsi singkat materi ini (Opsional)..."></textarea>

                <input type="text" id="matLink" placeholder="Tempel Link Google Drive / Web di sini..." required>
                <input type="file" id="matFile" class="file-input" accept=".pdf,.ppt,.pptx,.doc,.docx"
                    style="display: none;">

                <button onclick="addMaterial()" style="background-color: #14b8a6;">☁️ Simpan Materi</button>
            </section>

            <!-- Lists -->
            <section class="list-section">
                <h2>Daftar Tunggu Tugas</h2>
                <ul id="taskList"></ul>

                <div class="list-header" style="margin-top: 2rem;">
                    <h2>Arsip Materi Kuliah</h2>
                    <select id="filterCourse" onchange="renderMaterials()">
                        <option value="Semua">Tampilkan Semua Matkul</option>
                    </select>
                </div>
                <ul id="materialList"></ul>
            </section>
        </div>

        <div id="tab-acara" class="tab-content">
            <section class="input-section">
                <input type="text" id="eventName" placeholder="Nama Acara (misal: Kerja Kelompok)..." required>
                <input type="text" id="eventLocation" placeholder="Lokasi (misal: Perpus / Zoom)..." required>
                <textarea id="eventDesc" rows="2"
                    placeholder="Catatan acara misal 'bawa buku' (Opsional)..."></textarea>
                <div class="datetime-group">
                    <input type="date" id="eventDate" required>
                    <input type="time" id="eventTime" required>
                </div>
                <button onclick="addEvent()" style="background-color: #8b5cf6;">+ Tambah Jadwal</button>
            </section>
            <section class="list-section">
                <h2>Jadwal Mendatang</h2>
                <ul id="eventList"></ul>
            </section>
        </div>

    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
